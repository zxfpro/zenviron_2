services:
  mysql:
    image: mysql:8.4
    container_name: kanban-m-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: kanban_m
      MYSQL_USER: kanban
      MYSQL_PASSWORD: kanban123
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - kanban_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: kanban-m-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      KANBAN_DATABASE_URL: mysql+pymysql://root:1234@mysql:3306/kanban_m?charset=utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: kanban-m-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://127.0.0.1:8001
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"

volumes:
  kanban_mysql_data:

