server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    default_type application/json;
    return 200 '{"status":"ok","service":"clean-frontend-v2","version":"0.1.0","timestamp":"$time_iso8601"}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
