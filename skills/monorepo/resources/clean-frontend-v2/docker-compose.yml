services:
  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: clean-frontend-v2
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
