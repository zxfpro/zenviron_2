# Prometheus 配置文件
global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'tool-server'
    environment: 'production'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - 'alerts.yml'

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI 应用监控
  - job_name: 'tool-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:5000']
        labels:
          service: 'tool-server'
          instance: 'app-1'
    scrape_interval: 10s
    scrape_timeout: 5s

  # PostgreSQL 监控（需要 postgres_exporter）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres_exporter:9187']

  # Nginx 监控（需要 nginx-prometheus-exporter）
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx_exporter:9113']

