# Alertmanager 配置文件

global:
  # 告警解析超时时间
  resolve_timeout: 5m
  # 默认通知配置
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'your-password'

# 告警路由配置
route:
  # 默认接收者
  receiver: 'default'
  # 分组等待时间
  group_wait: 10s
  # 分组间隔时间
  group_interval: 10s
  # 重复间隔时间
  repeat_interval: 12h
  # 路由规则
  routes:
    # 严重告警
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    
    # 警告告警
    - match:
        severity: warning
      receiver: 'warning-alerts'
      continue: true

# 告警接收者配置
receivers:
  # 默认接收者（可以配置为邮件、Slack、Webhook 等）
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # 严重告警接收者
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true
    # 邮件配置示例（需要配置 smtp）
    # email_configs:
    #   - to: 'ops-team@example.com'
    #     subject: '🚨 严重告警: {{ .GroupLabels.alertname }}'
    #     html: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # 警告告警接收者
  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true
    # 邮件配置示例
    # email_configs:
    #   - to: 'dev-team@example.com'
    #     subject: '⚠️ 警告: {{ .GroupLabels.alertname }}'

# 告警抑制规则
inhibit_rules:
  # 如果服务不可用，抑制其他告警
  - source_match:
      severity: 'critical'
      alertname: 'ServiceDown'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']

