version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: tool-server-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-tool_server}
      MYSQL_USER: ${DB_USER:-tool_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tool_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tool-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # Redis（用于Token验证和速率限制）
  redis:
    image: redis:7-alpine
    container_name: tool-server-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - tool-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # FastAPI应用（Gunicorn + UvicornWorker）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tool-server-app
    restart: always
    environment:
      # 运行环境
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-tool_user}
      DB_PASSWORD: ${DB_PASSWORD:-tool_password}
      DB_NAME: ${DB_NAME:-tool_server}
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DECODE_RESPONSES: "true"
      REDIS_TOKEN_KEY_PREFIX: ${REDIS_TOKEN_KEY_PREFIX:-login_tokens:}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS512}
      # 服务器配置
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5000
      # 工具执行配置
      TOOL_REQUEST_TIMEOUT: ${TOOL_REQUEST_TIMEOUT:-30}
      TOOL_MAX_RETRIES: ${TOOL_MAX_RETRIES:-3}
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_ENABLE_FILE: ${LOG_ENABLE_FILE:-true}
      LOG_ENABLE_CONSOLE: ${LOG_ENABLE_CONSOLE:-true}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-10485760}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}
      # 速率限制配置
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/1
      # Token鉴权配置
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
    # 不直接暴露端口，通过 Nginx 反向代理
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tool-network
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "
        echo 'Waiting for MySQL and Redis to be ready...' &&
        sleep 5 &&
        echo 'Initializing database...' &&
        python scripts/init_db_mysql.py &&
        echo 'Starting Gunicorn server...' &&
        gunicorn -c gunicorn_config.py main:app
      "

  # Nginx 反向代理（HTTPS）
  nginx:
    image: nginx:alpine
    container_name: tool-server-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - app
    networks:
      - tool-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    command: >
      sh -c "
        # 根据环境变量选择配置文件
        if [ \"$${ENABLE_HTTPS:-true}\" = \"true\" ] && [ -f /etc/nginx/ssl/cert.pem ] && [ -f /etc/nginx/ssl/key.pem ]; then
          # 启用 HTTPS 配置
          rm -f /etc/nginx/conf.d/tool-server-http-only.conf
          echo 'Nginx 使用 HTTPS 配置'
        else
          # 仅使用 HTTP 配置（开发环境）
          rm -f /etc/nginx/conf.d/tool-server.conf
          echo 'Nginx 使用 HTTP-only 配置'
        fi &&
        nginx -g 'daemon off;'
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: tool-server-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tool-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Alertmanager 告警
  alertmanager:
    image: prom/alertmanager:latest
    container_name: tool-server-alertmanager
    restart: always
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - tool-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: tool-server-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - tool-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tool-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local

# 环境变量说明：
# ENABLE_HTTPS: 是否启用 HTTPS（true/false），默认为 true
# NGINX_HTTP_PORT: Nginx HTTP 端口，默认 80
# NGINX_HTTPS_PORT: Nginx HTTPS 端口，默认 443
# 如果 ENABLE_HTTPS=false 或 SSL 证书不存在，将使用 HTTP-only 配置
#
# 监控相关环境变量：
# PROMETHEUS_PORT: Prometheus 端口，默认 9090
# ALERTMANAGER_PORT: Alertmanager 端口，默认 9093
# GRAFANA_PORT: Grafana 端口，默认 3000
# GRAFANA_ADMIN_USER: Grafana 管理员用户名，默认 admin
# GRAFANA_ADMIN_PASSWORD: Grafana 管理员密码，默认 admin
#
# Redis配置：
# REDIS_PORT: Redis端口，默认 6379
# REDIS_DB: Redis数据库编号，默认 0
# REDIS_PASSWORD: Redis密码（可选）
#
# JWT配置：
# JWT_SECRET: JWT解析密钥（必须与Java系统保持一致）
# JWT_ALGORITHM: JWT算法，默认 HS512

